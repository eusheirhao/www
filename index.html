<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pencari Kata Indonesia</title>

<style>

* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }

body{
font-family:system-ui,-apple-system,sans-serif;
background:#0a0a0a;
color:#e0e0e0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding:20px 10px;
}

/* ===== HALAMAN UPDATE ===== */

#updateLayer{
position:fixed;
inset:0;
background:#0a0a0a;
display:flex;
justify-content:center;
align-items:center;
z-index:999999;
}

.updateBox{
text-align:center;
background:#111;
padding:50px 60px;
border-radius:18px;
border:1px solid #333;
box-shadow:0 25px 80px rgba(0,0,0,0.95);
}

.updateBox h1{
font-size:30px;
color:#fff;
margin-bottom:10px;
}

.updateBox p{
color:#aaa;
font-size:16px;
}

.loader{
margin:25px auto 0;
width:40px;
height:40px;
border:4px solid #333;
border-top:4px solid #888;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* ===== WEBSITE KAMU ===== */

.container{
width:100%;
max-width:540px;
backdrop-filter:blur(12px);
background:rgba(18,18,18,0.96);
padding:28px 24px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.95);
border:1px solid #2a2a2a;
position:relative;
}

#jam{
position:absolute;
top:14px;
right:18px;
font-size:12px;
color:#888;
}

h1{
font-size:32px;
font-weight:700;
color:#f5f5f5;
margin-bottom:16px;
text-align:center;
}

textarea{
width:100%;
height:100px;
margin:16px 0 14px;
border:1px solid #2e2e2e;
border-radius:12px;
padding:14px;
background:#0f0f0f;
color:#f0f0f0;
font-size:15px;
}

button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:12px;
font-size:15px;
cursor:pointer;
font-weight:600;
color:#fff;
background:#3a3a3a;
}

button:hover{
filter:brightness(1.25);
}

#hasil{
margin-top:20px;
color:#aaa;
font-size:14px;
text-align:center;
}

</style>

</head>

<body>

<!-- LAYER UPDATE -->

<div id="updateLayer">
<div class="updateBox">

<h1>🚧 Sedang Maintenance 🚧 </h1>

<p>
<br>
Mohon bersabar dulu yaa terimakasih
</p>

<div class="loader"></div>

</div>
</div>

<!-- WEBSITE -->

<div class="container">

<div id="jam">Memuat waktu...</div>

<h1>Pencari Kata</h1>

<textarea placeholder="Ketik pola / kata di sini..."></textarea>

<button>Cari dari Depan</button> <button>Cari dari Belakang</button> <button>Cari Semua</button> <button>Cari Anagram</button>

<div id="hasil">
Website sedang diperbarui...
</div>

</div>

<script>

function updateJam(){
const now=new Date()
const opt={
timeZone:'Asia/Jakarta',
hour:'2-digit',
minute:'2-digit',
second:'2-digit',
hour12:false
}
document.getElementById("jam").innerHTML=
new Intl.DateTimeFormat('id-ID',opt).format(now)+" WIB"
}

setInterval(updateJam,1000)
updateJam()

</script>

</body>
</html>
