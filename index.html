<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Sandbox Builder live • kholiddzz edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- three.js terbaru (r169 saat ini – lebih stabil + bug fix banyak) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.169.0/examples/js/controls/OrbitControls.min.js"></script>

  <!-- MediaPipe modern – lebih akurat & ringan -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14"></script>

  <style>
    body,html { margin:0; padding:0; overflow:hidden; background:#020617; font-family: 'Inter',sans-serif; }
    canvas { display:block; }
    .glass { background:rgba(10,15,30,0.88); backdrop-filter:blur(16px); border:1px solid rgba(34,211,238,0.18); box-shadow:0 10px 30px -10px #000; }
    #toast { transition:all .4s cubic-bezier(.175,.885,.32,1.275); opacity:0; transform:translateY(20px) scale(.9); }
    #toast.show { opacity:1; transform:translateY(0) scale(1); }
    #video-container {
      position:fixed; bottom:16px; right:16px; width:180px; height:135px;
      border-radius:12px; overflow:hidden; border:2px solid rgba(56,189,248,.45);
      box-shadow:0 15px 20px -5px rgba(0,0,0,.65); z-index:50;
    }
    #webcam-video, #guidance-canvas { position:absolute; inset:0; transform:scaleX(-1); object-fit:cover; }
    #tool-bar { position:fixed; top:16px; right:16px; z-index:60; display:flex; flex-wrap:wrap; gap:10px; }
    .tool-btn {
      padding:10px 16px; font-size:.95rem; font-weight:700; border-radius:14px;
      transition:all .3s ease; box-shadow:0 4px 15px rgba(0,0,0,.5);
    }
    .tool-btn:hover { transform:scale(1.08) translateY(-2px); box-shadow:0 10px 25px rgba(0,0,0,.7); }
  </style>
</head>
<body>

<div id="canvas-container" class="absolute inset-0"></div>

<div id="ui-layer" class="absolute inset-0 pointer-events-none p-4 md:p-8">
  <div class="flex justify-between items-start">
    <div class="flex flex-col gap-1 pointer-events-auto">
      <h1 class="text-white text-3xl font-black tracking-tighter italic uppercase">Sandbox <span class="text-blue-500">v4</span></h1>
      <div id="status-indicator" class="glass inline-flex items-center px-4 py-2 rounded-full self-start shadow-lg">
        <span id="status-dot" class="w-3 h-3 rounded-full bg-yellow-500 mr-3 animate-pulse shadow-[0_0_10px_#eab308]"></span>
        <span id="status-text" class="text-sm font-bold uppercase tracking-widest text-slate-200">Initializing...</span>
      </div>
    </div>

    <div id="toast" class="glass px-6 py-3 rounded-2xl shadow-2xl pointer-events-auto hidden">
      <p class="text-blue-400 text-sm font-bold tracking-wide uppercase">Saved to LocalStorage</p>
    </div>
  </div>

  <div id="tool-bar" class="glass">

    <!-- tombol spawn sama seperti lu, cuma gua tambah scale biar konsisten -->
    <button onclick="spawnObject('box',0,15,0)" class="tool-btn bg-slate-800/70 hover:bg-blue-700/90 text-white border border-blue-500/30 hover:border-blue-400">Block</button>
    <button onclick="spawnObject('sphere',0,15,0)" class="tool-btn bg-slate-800/70 hover:bg-red-700/90 text-white border border-red-500/30 hover:border-red-400">Sphere</button>
    <button onclick="spawnObject('cylinder',0,15,0)" class="tool-btn bg-slate-800/70 hover:bg-purple-700/90 text-white border border-purple-500/30 hover:border-purple-400">Pillar</button>
    <!-- sisanya lu tambah sendiri, sama aja -->

    <button onclick="clearAll()" class="tool-btn bg-red-950/80 hover:bg-red-800/90 text-red-200 hover:text-white border border-red-700/50 font-extrabold uppercase tracking-wider animate-pulse">Reset All</button>

    <a href="https://www.tiktok.com/@kholiddzz" target="_blank" class="tool-btn bg-gradient-to-r from-cyan-900/70 to-blue-900/70 hover:from-cyan-700/90 hover:to-blue-700/90 text-cyan-300 hover:text-white border border-cyan-400/50 font-bold italic">kholiddzz</a>
  </div>
</div>

<div id="video-container">
  <video id="webcam-video" autoplay playsinline></video>
  <canvas id="guidance-canvas"></canvas>
</div>

<div id="loading-screen" class="absolute inset-0 z-50 bg-[#020617] flex flex-col items-center justify-center">
  <div class="relative w-24 h-24 mb-8">
    <div class="absolute inset-0 border-4 border-blue-500/30 rounded-full"></div>
    <div class="absolute inset-0 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
  </div>
  <h2 class="text-white text-2xl font-black tracking-widest uppercase">Crushing Reality...</h2>
</div>

<script type="module">
  import { Hands } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14';

  const { Hands: HandsTask, FilesetResolver } = Hands;

  let scene, camera, renderer, controls;
  let objects = [];
  let handLandmarker;
  let video, canvas, ctx;
  let grabbed = [null, null];
  const GRAVITY = 0.08;
  const PINCH_THRESHOLD = 0.035; // lebih kecil karena normalized 0–1

  async function init() {
    // ─── Three.js ───────────────────────────────────────
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020617);
    scene.fog = new THREE.Fog(0x020617, 40, 120);

    camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 200);
    camera.position.set(0, 18, 45);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 10;
    controls.maxDistance = 120;

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dir = new THREE.DirectionalLight(0xffffff, 1.1);
    dir.position.set(25, 60, 30);
    dir.castShadow = true;
    scene.add(dir);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(300,300),
      new THREE.MeshStandardMaterial({color:0x0f172a, roughness:0.85})
    );
    floor.rotation.x = -Math.PI/2;
    floor.receiveShadow = true;
    scene.add(floor);

    // ─── MediaPipe Hands (modern) ───────────────────────
    const fileset = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    handLandmarker = await HandsTask.createFromOptions(fileset, {
      baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task` },
      runningMode: "VIDEO",
      numHands: 2,
      minHandDetectionConfidence: 0.65,
      minTrackingConfidence: 0.55
    });

    video = document.getElementById('webcam-video');
    canvas = document.getElementById('guidance-canvas');
    ctx = canvas.getContext('2d');
    canvas.width = 320; canvas.height = 240;

    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      predictLoop();
    };

    loadSaved();
    animate();
  }

  async function predictLoop() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      ctx.save();
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.scale(-1,1);
      ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
      ctx.restore();

      const results = await handLandmarker.detectForVideo(video, performance.now());

      if (results.landmarks?.length > 0) {
        updateStatus(true);
        handleHands(results.landmarks);
        // optional: draw landmarks di canvas kalo lu mau visual guidance
      } else {
        updateStatus(false);
        releaseAllHands();
      }
    }
    requestAnimationFrame(predictLoop);
  }

  function handleHands(landmarkSets) {
    landmarkSets.forEach((landmarks, handIdx) => {
      if (handIdx > 1) return;

      const thumb = landmarks[4];
      const index = landmarks[8];
      const pinchDist = Math.hypot(
        thumb.x - index.x,
        thumb.y - index.y,
        thumb.z - index.z
      );

      const worldPos = new THREE.Vector3(
        (index.x - 0.5) * 60,
        (1 - index.y) * 50 - 5,
        index.z * -50 + 10   // z agak ditekan biar ga terlalu jauh
      );

      if (pinchDist < PINCH_THRESHOLD) {
        if (!grabbed[handIdx]) {
          let closest = null, minDist = 14;
          objects.forEach(obj => {
            const d = obj.position.distanceTo(worldPos);
            if (d < minDist) { minDist = d; closest = obj; }
          });
          if (closest) {
            grabbed[handIdx] = closest;
            closest.userData.isGrabbed = true;
          }
        }

        if (grabbed[handIdx]) {
          // simple average kalo dua tangan pegang satu object
          if (grabbed[0] === grabbed[1] && grabbed[0]) {
            const otherIdx = handIdx ^ 1;
            const otherLandmarks = landmarkSets[otherIdx];
            if (otherLandmarks) {
              const otherPos = new THREE.Vector3(
                (otherLandmarks[8].x - 0.5)*60,
                (1 - otherLandmarks[8].y)*50 - 5,
                otherLandmarks[8].z * -50 + 10
              );
              worldPos.lerp(otherPos, 0.5);
            }
          }

          grabbed[handIdx].position.lerp(worldPos, 0.55); // lebih smooth
        }
      } else if (grabbed[handIdx]) {
        grabbed[handIdx].userData.isGrabbed = false;
        grabbed[handIdx] = null;
        save();
      }
    });
  }

  function releaseAllHands() {
    grabbed.forEach((obj, i) => {
      if (obj) {
        obj.userData.isGrabbed = false;
        grabbed[i] = null;
      }
    });
    save();
  }

  function updatePhysics() {
    objects.forEach(obj => {
      if (obj.userData.isGrabbed) return;

      obj.userData.velocity = (obj.userData.velocity || 0) - GRAVITY;
      let ny = obj.position.y + obj.userData.velocity;

      // simple floor
      if (ny < 2) {
        ny = 2;
        obj.userData.velocity = 0;
      }

      obj.position.y = ny;
    });
  }

  function spawnObject(type, x=0, y=15, z=0) {
    let geo, color = 0xffffff, scale = 1;

    switch(type){
      case 'box':     geo = new THREE.BoxGeometry(5,5,5); color=0x3b82f6; break;
      case 'sphere':  geo = new THREE.SphereGeometry(3,32,32); color=0xef4444; scale=1.1; break;
      case 'cylinder':geo = new THREE.CylinderGeometry(2.5,2.5,8,24); color=0xa855f7; break;
      // tambah sendiri sisanya
      default: return;
    }

    const mat = new THREE.MeshStandardMaterial({color, metalness:0.15, roughness:0.25});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x,y,z);
    mesh.scale.setScalar(scale);
    mesh.castShadow = mesh.receiveShadow = true;
    mesh.userData = { type, velocity: 0, isGrabbed: false };

    scene.add(mesh);
    objects.push(mesh);
    save();
  }

  function save() {
    const data = objects.map(o => ({
      type: o.userData.type,
      x: o.position.x.toFixed(2),
      y: o.position.y.toFixed(2),
      z: o.position.z.toFixed(2)
    }));
    localStorage.setItem('kholiddzz_sandbox', JSON.stringify(data));

    const t = document.getElementById('toast');
    t.classList.remove('hidden');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function loadSaved() {
    const raw = localStorage.getItem('kholiddzz_sandbox');
    if (!raw) return;
    try {
      const data = JSON.parse(raw);
      data.forEach(d => spawnObject(d.type, Number(d.x), Number(d.y), Number(d.z)));
    } catch(e) {}
  }

  function clearAll() {
    objects.forEach(o => scene.remove(o));
    objects.length = 0;
    grabbed.fill(null);
    localStorage.removeItem('kholiddzz_sandbox');
  }

  function updateStatus(active) {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    if (active) {
      dot.className = "w-3 h-3 rounded-full bg-emerald-400 mr-3 shadow-[0_0_12px_#34d399]";
      txt.textContent = "Hands Locked";
      txt.className = "text-sm font-bold uppercase tracking-widest text-emerald-400";
      document.getElementById('loading-screen').style.display = 'none';
    } else {
      dot.className = "w-3 h-3 rounded-full bg-yellow-500 mr-3 animate-pulse shadow-[0_0_10px_#eab308]";
      txt.textContent = "Waiting Hands...";
      txt.className = "text-sm font-bold uppercase tracking-widest text-slate-300";
    }
  }

  function animate() {
    requestAnimationFrame(animate);
    updatePhysics();
    controls.update();
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  init().catch(console.error);
</script>
</body>
</html>
