
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pencari Kata Indonesia</title>

<style>

body{
font-family:system-ui;
background:linear-gradient(180deg,#6d28d9,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:440px;
background:#071529;
padding:28px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.badge{
display:inline-block;
background:#7c3aed;
padding:6px 12px;
border-radius:20px;
font-size:12px;
margin-bottom:8px;
}

h1{
margin:0;
font-size:32px;
}

textarea{
width:100%;
height:80px;
margin-top:18px;
border:none;
border-radius:12px;
padding:12px;
background:#1e293b;
color:white;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.btn1{
background:linear-gradient(90deg,#22c55e,#16a34a);
}

.btn2{
background:linear-gradient(90deg,#9333ea,#c026d3);
}

.btn3{
background:linear-gradient(90deg,#06b6d4,#0891b2);
}

button:hover{
transform:scale(1.03);
}

#saran{
margin-top:8px;
font-size:13px;
opacity:0.8;
}

#hasilBox{
margin-top:18px;
background:#1e293b;
border-radius:12px;
padding:12px;
max-height:220px;
overflow:auto;
}

.kata{
display:inline-block;
background:#0f172a;
padding:6px 10px;
margin:4px;
border-radius:8px;
font-size:14px;
}

.counter{
margin-bottom:10px;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<div class="badge">BY : kholiddzz</div>
<h1>Pencari Kata</h1>

<textarea id="input" placeholder="Contoh: kontol"></textarea>

<button class="btn1" onclick="cariDepan()">Cari dari Depan</button>
<button class="btn2" onclick="cariBelakang()">Cari dari Belakang</button>
<button class="btn3" onclick="cariSemua()">Cari Semua</button>

<div id="saran"></div>

<div id="hasilBox">
<div id="hasil">Memuat kamus...</div>
</div>

</div>

<script>

let kamus=[]

fetch("https://raw.githubusercontent.com/hermitdave/FrequencyWords/master/content/2018/id/id_50k.txt")
.then(res=>res.text())
.then(data=>{
kamus=data.split("\n").map(x=>x.split(" ")[0])
document.getElementById("hasil").innerHTML="Kamus siap ("+kamus.length+" kata)"
})

function input(){
return document.getElementById("input").value.toLowerCase()
}

function tampil(data){

let hasil=document.getElementById("hasil")

if(data.length==0){
hasil.innerHTML="Tidak ada kata ditemukan"
return
}

let html="<div class='counter'>"+data.length+" kata ditemukan</div>"

data.slice(0,400).forEach(k=>{
html+="<span class='kata'>"+k+"</span>"
})

hasil.innerHTML=html

}

function cariDepan(){
let k=input()
let hasil=kamus.filter(x=>x.startsWith(k))
tampil(hasil)
}

function cariBelakang(){
let k=input()
let hasil=kamus.filter(x=>x.endsWith(k))
tampil(hasil)
}

function cariSemua(){
let k=input()
let hasil=kamus.filter(x=>x.includes(k))
tampil(hasil)
}

document.getElementById("input").addEventListener("input",()=>{

let k=input()

if(k.length<2){
document.getElementById("saran").innerHTML=""
return
}

let saran=kamus.filter(x=>x.startsWith(k)).slice(0,5)

document.getElementById("saran").innerHTML="Saran: "+saran.join(", ")

})

</script>

</body>
</html>
