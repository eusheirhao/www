<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pencari Kata Indonesia</title>

<style>
* {
  user-select: none;
  -webkit-user-select: none;
  box-sizing: border-box;
}
body {
  font-family: system-ui;
  background: linear-gradient(135deg, #6d28d9, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}
.container {
  width: 460px;
  backdrop-filter: blur(10px);
  background: rgba(15, 23, 42, 0.85);
  padding: 30px;
  border-radius: 22px;
  box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.05);
  position: relative;
}
#jam {
  position: absolute;
  top: 12px;
  right: 18px;
  font-size: 13px;
  font-weight: 500;
  color: #c4b5fd;
  background: rgba(0,0,0,0.4);
  padding: 6px 12px;
  border-radius: 12px;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(90deg, #9333ea, #c026d3);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  margin-bottom: 10px;
  font-weight: 600;
  width: fit-content;
}
.verified {
  width: 18px;
  height: 18px;
}
h1 {
  margin: 0;
  font-size: 34px;
  font-weight: 700;
}
textarea {
  width: 100%;
  height: 90px;
  margin-top: 18px;
  border: none;
  border-radius: 14px;
  padding: 14px;
  background: #1e293b;
  color: white;
  font-size: 16px;
  outline: none;
  user-select: text;
}
textarea:focus {
  box-shadow: 0 0 0 2px #7c3aed;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  cursor: pointer;
  font-weight: 700;
  transition: 0.25s;
}
.btn1 { background: linear-gradient(90deg, #22c55e, #16a34a); }
.btn2 { background: linear-gradient(90deg, #9333ea, #c026d3); }
.btn3 { background: linear-gradient(90deg, #06b6d4, #0891b2); }
button:hover {
  transform: scale(1.04);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
}
#saran {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.85;
}
#hasilBox {
  margin-top: 20px;
  background: #0f172a;
  border-radius: 14px;
  padding: 14px;
  max-height: 240px;
  overflow: auto;
}
.kata {
  display: inline-block;
  background: #020617;
  padding: 7px 12px;
  margin: 5px;
  border-radius: 10px;
  font-size: 14px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  cursor: pointer;
}
.kata:hover {
  background: #7c3aed;
}
.counter {
  margin-bottom: 10px;
  font-weight: 700;
  color: #a78bfa;
}
.best {
  background: #22c55e;
}
</style>
</head>

<body>

<div class="container">

  <div id="jam">Memuat waktu Indonesia...</div>

  <div class="badge">
    By : @Kholiddzz
    <svg class="verified" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="#1d9bf0"/>
      <path d="M7 12.5L10.2 15.5L17 9.5" stroke="white" stroke-width="2.5" fill="none"/>
    </svg>
  </div>

  <h1>Pencari Kata</h1>

  <textarea id="input" placeholder="Masukkan teks..."></textarea>

  <button class="btn1" onclick="cariDepan()">Cari dari Depan</button>
  <button class="btn2" onclick="cariBelakang()">Cari dari Belakang</button>
  <button class="btn3" onclick="cariSemua()">Cari Semua</button>

  <div id="saran"></div>

  <div id="hasilBox">
    <div id="hasil">Memuat kamus...</div>
  </div>

</div>

<script>

const kataTambahan = [
  "generatif", "ilustratif", "imitatif", "imperatif", "implikatif", "inovatif", "instruktif", "integratif", "intensif", "interaktif", "interpretatif", "intuitif", "inventif", "investigatif", "justifikatif", "kognitif", "komparatif", "komunikatif", "konfirmatif", "konotatif", "konstruktif", "konsultatif", "konsumtif", "kreatif", "kualitatif", "kuantitatif", "legislatif", "lokatif", "manipulatif", "naratif",
  "objektif", "operatif", "partisipatif", "pasif", "persuasif", "prediktif", "preventif", "produktif", "progresif", "prohibitif", "protektif", "provokatif", "reaktif", "reflektif", "regulatif", "relatif", "representatif", "reproduktif", "restriktif", "selektif", "sensitif", "solutif", "spesifik", "subjektif", "substantif", "sugestif", "suportif", "transformatif", "informatif", "kolektif",
  "aktif", "adaptif", "adiktif", "administratif", "afektif", "agresif", "alternatif", "argumentatif", "asosiatif", "atraktif", "autoritatif", "deduktif", "definitif", "deformatif", "demonstratif", "deskriptif", "detektif", "direktif", "distributif", "edukatif", "efektif", "ekspansif", "ekspresif", "eksploratif", "eksploitatif", "ekstensif", "evaluatif", "evokatif", "fiktif", "formulatif",
  "kualifikatif", "konservatif", "konseptual", "kontradiktif", "korelatif", "kritis", "kuratif", "limitatif", "logaritmik", "magnetif", "manifestif", "modifikatif", "motivatif", "negatif", "normatif", "oklusif", "operasional", "optatif", "organisatif", "perfektif", "perseptif", "positif", "preskriptif", "presipitatif", "proaktif", "prospektif", "purifikatif", "realistif", "reduktif", "refleksif", "reformatif", "regresif", "relaksatif", "repetitif", "respektif", "restoratif", "retrospektif", "revisif", "simulatif", "spekulatif", "statif", "strategif", "subversif", "suksesif", "superlatif", "supresif", "sistematif", "tentatif", "transitif", "verifikatif", "vokalif", "akomodatif", "aplikatif", "asertif", "autentikatif", "cooperatif", "defensif", "destruktif", "difusif", "disruptif", "eksklusif", "ekstensif", "emulsif", "enklusif", "evasif", "expansif", "fakultatif", "fertilif", "fruktif", "imperfektif", "impressif", "indikatif", "infinitif", "inhibitif", "instingtif", "interogatif", "introspektif", "konjugatif", "konklusif", "konstitutif", "konversif", "korosif", "kreatif", "kualitatif",
  "xenon", "xantat", "xantenda", "xantofil", "xenia", "xenofili", "xenofobia", "xenoglosia", "xenograf", "xenokrasi", "xenolit", "xenomania", "xerofil", "xeroftalmia", "xerografi", "xerosis", "xifoid", "xilem", "xilena", "xilosa", "xilofon", "xilograf", "xilografi", "xiloid", "xiloidina", "xilol", "xilologi", "xilonit", "xilos", "xantena", "xerofit", "x-ray", "xenograf", "xantofil", "xeroderma",
  "nasional", "internasional", "regional", "lokal", "global", "digital", "virtual", "fisikal", "mental", "emosional", "sosial", "kultural", "tradisional", "modern", "klasikal", "teknikal", "medis", "klinis", "patologis", "simetris", "asimetri", "organik", "inorganik", "atomik", "molekuler", "biologis", "psikologis", "sosiologis", "ekonomis", "historis", "geografis", "astronomis", "matematis", "fisik", "kimiawi", "biokimia", "genetik", "evolusioner", "filosofis", "etis", "moralis", "estetis", "praktis", "teoritis", "empiris", "analitis", "sintetis", "dialektis", "heuristik", "intuitif", "logis", "metodis", "statistik", "dinamis", "statis", "kronologis", "hierarkis", "sistematis"
].map(w => w.toLowerCase());

let kamus = [];

fetch("https://raw.githubusercontent.com/hermitdave/FrequencyWords/master/content/2018/id/id_50k.txt")
  .then(res => res.text())
  .then(data => {
    kamus = data
      .split("\n")
      .map(x => x.split(" ")[0].toLowerCase())
      .filter(k => /^[a-z]+$/.test(k) && k.length >= 3 && k.length <= 16);

    kamus = [...new Set([...kataTambahan, ...kamus])];

    document.getElementById("hasil").innerHTML = "Kamus siap (" + kamus.length + " kata)";
  })
  .catch(err => {
    document.getElementById("hasil").innerHTML = "Gagal memuat kamus";
  });

// === BAGIAN JAM REAL-TIME + AUTO RELOAD SAAT GANTI HARI ===
let hariSebelumnya = null;

function updateJam() {
  const now = new Date();
  const options = {
    timeZone: 'Asia/Jakarta',
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  };
  const formatter = new Intl.DateTimeFormat('id-ID', options);
  let waktu = formatter.format(now) + " WIB";

  document.getElementById("jam").innerHTML = waktu;

  // Cek apakah hari sudah berganti
  const hariSekarang = now.toLocaleDateString('id-ID', { timeZone: 'Asia/Jakarta' });
  
  if (hariSebelumnya !== null && hariSebelumnya !== hariSekarang) {
    // Hari sudah berganti → reload halaman otomatis
    console.log("Hari berganti! Reload halaman...");
    window.location.reload();
  }
  
  hariSebelumnya = hariSekarang;
}

// Jalankan pertama kali + setiap detik
setInterval(updateJam, 1000);
updateJam();

function input() {
  return document.getElementById("input").value.toLowerCase().trim();
}

function tampil(data) {
  let hasil = document.getElementById("hasil");

  const uniqueData = [...new Set(data)];

  if (uniqueData.length === 0) {
    hasil.innerHTML = "Tidak ada kata ditemukan";
    return;
  }

  uniqueData.sort((a, b) => b.length - a.length || a.localeCompare(b));

  let terbaik = uniqueData[0];

  let html = "<div class='counter'>" + uniqueData.length + " kata ditemukan (duplikat sudah dihapus)</div>";

  uniqueData.slice(0, 2000).forEach(k => {
    if (k === terbaik) {
      html += "<span class='kata best' onclick='copyKata(this)'>" + k + "</span>";
    } else {
      html += "<span class='kata' onclick='copyKata(this)'>" + k + "</span>";
    }
  });

  hasil.innerHTML = html;
}

function copyKata(el) {
  navigator.clipboard.writeText(el.innerText);
  const originalBg = el.style.background;
  el.style.background = "#22c55e";
  setTimeout(() => { el.style.background = originalBg; }, 500);
}

function cariDepan() {
  let k = input();
  if (!k) return;
  tampil(kamus.filter(x => x.startsWith(k)));
}

function cariBelakang() {
  let k = input();
  if (!k) return;
  tampil(kamus.filter(x => x.endsWith(k)));
}

function cariSemua() {
  let k = input();
  if (!k) return;
  tampil(kamus.filter(x => x.includes(k)));
}

document.getElementById("input").addEventListener("input", () => {
  let k = input();
  if (k.length < 2) {
    document.getElementById("saran").innerHTML = "";
    return;
  }

  let saran = kamus.filter(x => x.startsWith(k)).slice(0, 10);
  document.getElementById("saran").innerHTML = "Saran: " + (saran.length ? saran.join(", ") : "—");
});

</script>

</body>
</html>
